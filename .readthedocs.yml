# .readthedocs.yml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: ubuntu-22.04
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv sync --all-extras
    - uv run sphinx-build --fail-on-warning -T -b html docs $READTHEDOCS_OUTPUT/html
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py

formats: all
